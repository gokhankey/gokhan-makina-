<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gokhan Makina">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Gokhan Makina - Saha Ekip Yonetimi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --ink: #182230;
      --muted: #667085;
      --line: #d7e0eb;
      --panel: rgba(255, 255, 255, .94);
      --soft: #f5f7fb;
      --brand: #0f766e;
      --brand-dark: #0b5d57;
      --navy: #101828;
      --gold: #d97706;
      --green: #0f766e;
      --amber: #b54708;
      --red: #b42318;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, .08), transparent 32%),
        linear-gradient(315deg, rgba(217, 119, 6, .08), transparent 30%),
        #eef3f8;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    button, input, textarea, select { font: inherit; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .app-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 18px 40px rgba(16, 24, 40, .08);
      backdrop-filter: blur(10px);
    }
    .app-button {
      min-height: 40px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      font-weight: 800;
      font-size: 13px;
      transition: .15s ease;
      white-space: nowrap;
    }
    .btn-primary { background: linear-gradient(135deg, var(--brand), #115e59); color: #fff; box-shadow: 0 12px 22px rgba(15, 118, 110, .18); }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #8f1d14; }
    .btn-green { background: linear-gradient(135deg, var(--green), #0b5d57); color: #fff; }
    .btn-green:hover { background: #0b5d57; }
    .btn-ghost { background: #fff; border: 1px solid var(--line); color: #344054; }
    .btn-ghost:hover { background: #f8fafc; }
    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: #fff;
      color: #475569;
    }
